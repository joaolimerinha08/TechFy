
<link rel="stylesheet" href="./login.css" />
<div class="login-page">
  <div class="login-card">
    <div class="login-hero">
      <div class="hero-icon">
        <mat-icon>shield</mat-icon>
      </div>
      <h1>SafeExit Escolar</h1>
      <p>Controle e Segurança de Saídas</p>
    </div>

    <div class="login-form">
      <label>E-mail ou Usuário</label>
      <mat-form-field appearance="outline" floatlabel="never">
        <mat-icon matPrefix></mat-icon>
        <input class="botao" type="text" placeholder="admin@escola.com.br" />
      </mat-form-field>

      <div class="form-row">
        <label>Senha</label>
        <a mat-button routerLink="/esqueci-senha" class="forgot-link">Esqueceu a senha?</a>
      </div>

      <mat-form-field appearance="outline" floatlabel="never">
        <mat-icon matPrefix></mat-icon>
        <input class="botao" matInput type="password" placeholder="************" />
      </mat-form-field>

      <button mat-flat-button class="login-btn" type="button">Entrar no Sistema</button>
      <p class="login-footer">Acesso restrito a funcionários autorizados da instituição.</p>
    </div>
  </div>
</div>
